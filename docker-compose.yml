version: "3.8"

services:
  codex-relayx:
    build: .
    container_name: codex-relayx
    restart: unless-stopped
    ports:
      - "8001:8001"
    volumes:
      # 宿主机目录挂载（config.json + 日志）
      - ./data:/var/lib/codex-relayx
    environment:
      - TZ=Asia/Shanghai
      - RELAYX_DATA_DIR=/var/lib/codex-relayx
    healthcheck:
      test: ["CMD", "/codex-relayx", "--help"]
      interval: 30s
      timeout: 10s
      retries: 3
