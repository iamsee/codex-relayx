name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.0). Leave blank to use the latest pushed tag.'
        required: false

permissions:
  contents: write   # create the GitHub Release and upload assets

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          else
            # GITHUB_REF_NAME is the tag for tag pushes
            TAG="${GITHUB_REF_NAME#refs/tags/}"
            TAG="${TAG#v}"
          fi
          echo "version=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Release version: ${TAG}"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Build linux/amd64
        env:
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          GOOS=linux GOARCH=amd64 \
            go build -trimpath -ldflags "-s -w" \
            -o dist/codex-relayx-linux-amd64 \
            ./cmd/codex-relayx

      - name: Build linux/arm64
        env:
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          GOOS=linux GOARCH=arm64 \
            go build -trimpath -ldflags "-s -w" \
            -o dist/codex-relayx-linux-arm64 \
            ./cmd/codex-relayx

      - name: Build windows/amd64
        env:
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          GOOS=windows GOARCH=amd64 \
            go build -trimpath -ldflags "-s -w" \
            -o dist/codex-relayx-windows-amd64.exe \
            ./cmd/codex-relayx

      - name: Compute SHA256SUMS
        working-directory: dist
        run: sha256sum * > SHA256SUMS

      - name: Show artifacts
        run: ls -la dist
        working-directory: ${{ github.workspace }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.tag.outputs.version }}
          generate_release_notes: true
          files: |
            dist/codex-relayx-linux-amd64
            dist/codex-relayx-linux-arm64
            dist/codex-relayx-windows-amd64.exe
            dist/SHA256SUMS
          draft: false
          prerelease: false
